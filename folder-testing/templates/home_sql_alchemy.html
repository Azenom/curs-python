<!DOCTYPE html>
<html>
<head>
    <title>Students App with SQL Alchemy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            }

        h2 {
            color: #2c3e50;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .links a {
            display: inline-block;
            margin-right: 10px;
            padding: 8px 12px;
            text-decoration: none;
            color: white;
            background-color: #3498db;
            border-radius: 5px;
            transition: 0.3s;
        }

        .links a:hover {
            background-color: #2980b9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #ecf0f1;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
        }

        li span {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Students app home page</h2>

        <div class="links">
            <a href="{{ url_for('add') }}">Add new student</a>
            <a href="{{ url_for('update') }}">Update student</a>
            <a href="{{ url_for('delete') }}">Delete student</a>
        </div>

        <h3>Students list:</h3>
        <ul>
            {% for student in students %}
            <li>
                <span>CNP:</span> {{ student.cnp }} |
                <span>Nume:</span> {{ student.name }} |
                <span>Grade:</span> {{ student.grade }}
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
